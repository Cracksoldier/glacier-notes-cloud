openapi: 3.1.0
info:
  title: Glacier Notes Cloud API
  version: 1.0.0
  description: |
    Canonical contract for Glacier Notes Cloud. Operations are added before their
    implementing milestone. UUIDs use RFC 4122 form and timestamps are ISO-8601 UTC.
servers:
  - url: /
tags:
  - name: System
  - name: Setup
  - name: Authentication
  - name: Sessions
  - name: Administration
  - name: Notebooks
  - name: Notes
  - name: Images
  - name: Current User
  - name: Labels
paths:
  /api/v1/ping:
    get:
      tags: [System]
      summary: Check API connectivity
      operationId: ping
      security: []
      responses:
        '200':
          description: API is reachable
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/setup/status:
    get:
      tags: [Setup]
      summary: Check whether first-run setup is required
      operationId: getSetupStatus
      security: []
      responses:
        '200':
          description: Current setup state
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupStatus'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/setup/administrator:
    post:
      tags: [Setup]
      summary: Create the first administrator and initialize the instance
      operationId: createInitialAdministrator
      security:
        - bootstrapToken: []
      parameters:
        - $ref: '#/components/parameters/BootstrapToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitialAdministratorRequest'
      responses:
        '201':
          description: Instance initialized
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupCompletion'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '422':
          $ref: '#/components/responses/ProblemResponse'
        '429':
          $ref: '#/components/responses/RateLimitedProblemResponse'
        '503':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate with a username or email address
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
            Set-Cookie:
              description: Session and CSRF cookies.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionContext'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '429':
          $ref: '#/components/responses/RateLimitedProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/auth/logout:
    post:
      tags: [Authentication]
      summary: Revoke the current session
      operationId: logout
      responses:
        '204':
          description: Session revoked
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/auth/session:
    get:
      tags: [Authentication]
      summary: Get the current authenticated session
      operationId: getCurrentSession
      responses:
        '200':
          description: Current session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionContext'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/auth/invitations/inspect:
    post:
      tags: [Authentication]
      summary: Inspect an invitation token
      operationId: inspectInvitation
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Invitation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationInspection'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '429':
          $ref: '#/components/responses/RateLimitedProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/auth/invitations/accept:
    post:
      tags: [Authentication]
      summary: Accept an invitation and activate the account
      operationId: acceptInvitation
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationAcceptanceRequest'
      responses:
        '204':
          description: Invitation accepted
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '409':
          $ref: '#/components/responses/ProblemResponse'
        '422':
          $ref: '#/components/responses/ProblemResponse'
        '429':
          $ref: '#/components/responses/RateLimitedProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/auth/password-reset/request:
    post:
      tags: [Authentication]
      summary: Request a password-reset email
      operationId: requestPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '202':
          description: Request accepted regardless of account existence
        '429':
          $ref: '#/components/responses/RateLimitedProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/auth/password-reset/complete:
    post:
      tags: [Authentication]
      summary: Complete a password reset
      operationId: completePasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetCompletionRequest'
      responses:
        '204':
          description: Password changed and sessions revoked
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '422':
          $ref: '#/components/responses/ProblemResponse'
        '429':
          $ref: '#/components/responses/RateLimitedProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/me/sessions:
    get:
      tags: [Sessions]
      summary: List active sessions for the current user
      operationId: listSessions
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionSummary'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Sessions]
      summary: Revoke all sessions except the current one
      operationId: revokeOtherSessions
      responses:
        '204':
          description: Other sessions revoked
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/me/sessions/{sessionId}:
    delete:
      tags: [Sessions]
      summary: Revoke one of the current user's sessions
      operationId: revokeSession
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Session revoked
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/admin/status:
    get:
      tags: [Administration]
      summary: Get non-sensitive administrative status
      operationId: getAdminStatus
      responses:
        '200':
          description: Administrative status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStatus'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/admin/users:
    get:
      tags: [Administration]
      summary: List administrative user metadata
      operationId: listUsers
      parameters:
        - { name: query, in: query, schema: { type: string, maxLength: 320 } }
        - { name: role, in: query, schema: { type: string, enum: [USER, ADMIN] } }
        - { name: status, in: query, schema: { type: string, enum: [PENDING_ACTIVATION, ACTIVE, LOCKED, DEACTIVATED, PENDING_DELETION, DELETED] } }
        - { name: cursor, in: query, schema: { type: string, maxLength: 256 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
      responses:
        '200':
          description: User metadata page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserPage'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/admin/users/{userId}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Administration]
      summary: Get administrative user metadata
      operationId: getUser
      responses:
        '200':
          description: Administrative user metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    patch:
      tags: [Administration]
      summary: Change safe user identity or role fields
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdate'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
        '409':
          $ref: '#/components/responses/ProblemResponse'
        '422':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/admin/users/{userId}/activate:
    post:
      tags: [Administration]
      summary: Reactivate a deactivated user
      operationId: activateUser
      parameters: [{ $ref: '#/components/parameters/UserId' }]
      responses:
        '204': { description: User activated }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/admin/users/{userId}/deactivate:
    post:
      tags: [Administration]
      summary: Deactivate a user and revoke sessions
      operationId: deactivateUser
      parameters: [{ $ref: '#/components/parameters/UserId' }]
      responses:
        '204': { description: User deactivated }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/admin/users/{userId}/unlock:
    post:
      tags: [Administration]
      summary: Unlock a temporarily locked user
      operationId: unlockUser
      parameters: [{ $ref: '#/components/parameters/UserId' }]
      responses:
        '204': { description: User unlocked }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/admin/users/{userId}/password-reset:
    post:
      tags: [Administration]
      summary: Generate a copyable password-reset link
      operationId: createAdministrativePasswordReset
      parameters: [{ $ref: '#/components/parameters/UserId' }]
      responses:
        '201':
          description: One-time password-reset token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetLink'
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/admin/users/{userId}/sessions:
    delete:
      tags: [Administration]
      summary: Revoke all sessions for a user
      operationId: revokeUserSessions
      parameters: [{ $ref: '#/components/parameters/UserId' }]
      responses:
        '204': { description: Sessions revoked }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/admin/invitations:
    get:
      tags: [Administration]
      summary: List invitations without token values
      operationId: listInvitations
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [PENDING, ACCEPTED, REVOKED, EXPIRED] } }
        - { name: cursor, in: query, schema: { type: string, maxLength: 256 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
      responses:
        '200':
          description: Invitation page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationPage'
        default: { $ref: '#/components/responses/ProblemResponse' }
    post:
      tags: [Administration]
      summary: Create and deliver an invitation
      operationId: createInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationCreateRequest'
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationDelivery'
        '409': { $ref: '#/components/responses/ProblemResponse' }
        '422': { $ref: '#/components/responses/ProblemResponse' }
        '429': { $ref: '#/components/responses/RateLimitedProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/admin/invitations/{invitationId}/resend:
    post:
      tags: [Administration]
      summary: Regenerate and redeliver an invitation
      operationId: resendInvitation
      parameters: [{ $ref: '#/components/parameters/InvitationId' }]
      responses:
        '200':
          description: Replacement invitation delivery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationDelivery'
        '429': { $ref: '#/components/responses/RateLimitedProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/admin/invitations/{invitationId}:
    delete:
      tags: [Administration]
      summary: Revoke a pending invitation
      operationId: revokeInvitation
      parameters: [{ $ref: '#/components/parameters/InvitationId' }]
      responses:
        '204': { description: Invitation revoked }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/admin/settings:
    get:
      tags: [Administration]
      summary: Get lifecycle settings managed in M4
      operationId: getAdminSettings
      responses:
        '200':
          description: Lifecycle settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminSettings' }
        default: { $ref: '#/components/responses/ProblemResponse' }
    patch:
      tags: [Administration]
      summary: Update lifecycle settings managed in M4
      operationId: updateAdminSettings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminSettingsUpdate' }
      responses:
        '200':
          description: Updated lifecycle settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminSettings' }
        '422': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/notebooks:
    get:
      tags: [Notebooks]
      summary: List the current user's notebooks
      operationId: listNotebooks
      responses:
        '200':
          description: Owned notebooks in display order
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/NotebookView' }
        default: { $ref: '#/components/responses/ProblemResponse' }
    post:
      tags: [Notebooks]
      summary: Create a notebook
      operationId: createNotebook
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotebookCreate' }
      responses:
        '201':
          description: Notebook created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotebookView' }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        '422': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/notebooks/default:
    get:
      tags: [Notebooks]
      summary: Get the current user's default notebook
      operationId: getDefaultNotebook
      responses:
        '200':
          description: Default notebook
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotebookView' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/notebooks/reorder:
    post:
      tags: [Notebooks]
      summary: Replace the complete notebook display order
      operationId: reorderNotebooks
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotebookReorder' }
      responses:
        '200':
          description: Reordered notebooks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/NotebookView' }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        '422': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/notebooks/{notebookId}:
    parameters:
      - $ref: '#/components/parameters/NotebookId'
    get:
      tags: [Notebooks]
      summary: Get an owned notebook
      operationId: getNotebook
      responses:
        '200':
          description: Owned notebook
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotebookView' }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
    patch:
      tags: [Notebooks]
      summary: Rename or recolor an owned notebook
      operationId: updateNotebook
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotebookUpdate' }
      responses:
        '200':
          description: Updated notebook
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotebookView' }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        '422': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
    delete:
      tags: [Notebooks]
      summary: Delete a non-default notebook transactionally
      operationId: deleteNotebook
      parameters:
        - name: strategy
          in: query
          required: true
          schema: { type: string, enum: [MOVE_TO_DEFAULT, TRASH_NOTES] }
        - name: version
          in: query
          required: true
          schema: { type: integer, format: int64, minimum: 0 }
      responses:
        '204': { description: Notebook deleted }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/notes:
    get:
      tags: [Notes]
      summary: List and filter owned note summaries
      operationId: listNotes
      parameters:
        - { name: notebookId, in: query, schema: { type: string, format: uuid } }
        - { name: labelId, in: query, schema: { type: string, format: uuid } }
        - { name: noteType, in: query, schema: { $ref: '#/components/schemas/NoteType' } }
        - { name: pinned, in: query, schema: { type: boolean } }
        - { name: archive, in: query, schema: { type: string, enum: [ACTIVE, ARCHIVED, ALL], default: ACTIVE } }
        - { name: trash, in: query, schema: { type: string, enum: [ACTIVE, TRASHED, ALL], default: ACTIVE } }
        - { name: cursor, in: query, schema: { type: string, maxLength: 512 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
      responses:
        '200':
          description: Note summary page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotePage' }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        '422': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
    post:
      tags: [Notes]
      summary: Create a text or checklist note
      operationId: createNote
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NoteCreate' }
      responses:
        '201':
          description: Note created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentNote' }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        '422': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/images:
    post:
      tags: [Images]
      summary: Upload and normalize an owned image
      operationId: uploadImage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        '201':
          description: Normalized image metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImageMetadata' }
        '413': { $ref: '#/components/responses/ProblemResponse' }
        '422': { $ref: '#/components/responses/ProblemResponse' }
        '503': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/images/{imageId}:
    parameters:
      - name: imageId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Images]
      summary: Stream an owned normalized image
      operationId: downloadImage
      responses:
        '200':
          description: Normalized image bytes
          content:
            image/png: { schema: { type: string, format: binary } }
            image/jpeg: { schema: { type: string, format: binary } }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        '503': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
    delete:
      tags: [Images]
      summary: Delete an unreferenced owned image immediately
      operationId: deleteImage
      responses:
        '204': { description: Image deleted }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/images/{imageId}/thumbnail:
    get:
      tags: [Images]
      summary: Stream an owned image thumbnail
      operationId: downloadImageThumbnail
      parameters:
        - name: imageId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Thumbnail bytes
          content:
            image/png: { schema: { type: string, format: binary } }
            image/jpeg: { schema: { type: string, format: binary } }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/images/{imageId}/metadata:
    get:
      tags: [Images]
      summary: Get owned image metadata
      operationId: getImageMetadata
      parameters:
        - name: imageId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Image metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImageMetadata' }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/me/storage:
    get:
      tags: [Current User]
      summary: Get current user's image-storage usage
      operationId: getCurrentUserStorage
      responses:
        '200':
          description: Current storage usage and quota
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StorageUsage' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/notes/trash:
    delete:
      tags: [Notes]
      summary: Permanently delete all owned trashed notes
      operationId: emptyTrash
      responses:
        '200':
          description: Trash emptied
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EmptyTrashResult' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/notes/{noteId}:
    parameters:
      - $ref: '#/components/parameters/NoteId'
    get:
      tags: [Notes]
      summary: Get a complete owned note aggregate
      operationId: getNote
      responses:
        '200':
          description: Complete note
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentNote' }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
    patch:
      tags: [Notes]
      summary: Update an owned note aggregate
      operationId: updateNote
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NoteUpdate' }
      responses:
        '200':
          description: Updated note
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentNote' }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        '422': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
    delete:
      tags: [Notes]
      summary: Permanently delete an owned trashed note
      operationId: purgeNote
      parameters:
        - name: version
          in: query
          required: true
          schema: { type: integer, format: int64, minimum: 0 }
      responses:
        '204': { description: Note permanently deleted }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/notes/{noteId}/trash:
    post:
      tags: [Notes]
      summary: Move an owned note to trash
      operationId: trashNote
      parameters: [{ $ref: '#/components/parameters/NoteId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VersionRequest' }
      responses:
        '200':
          description: Trashed note
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentNote' }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/notes/{noteId}/restore:
    post:
      tags: [Notes]
      summary: Restore an owned trashed note
      operationId: restoreNote
      parameters: [{ $ref: '#/components/parameters/NoteId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VersionRequest' }
      responses:
        '200':
          description: Restored note
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentNote' }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/notes/{noteId}/move:
    post:
      tags: [Notes]
      summary: Move an owned note to another owned notebook
      operationId: moveNote
      parameters: [{ $ref: '#/components/parameters/NoteId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NoteMove' }
      responses:
        '200':
          description: Moved note
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentNote' }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/notes/{noteId}/convert:
    post:
      tags: [Notes]
      summary: Convert between text and checklist note types
      operationId: convertNote
      parameters: [{ $ref: '#/components/parameters/NoteId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NoteConversion' }
      responses:
        '200':
          description: Converted note
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ContentNote' }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/labels:
    get:
      tags: [Labels]
      summary: List owned labels
      operationId: listLabels
      responses:
        '200':
          description: Owned labels
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LabelView' }
        default: { $ref: '#/components/responses/ProblemResponse' }
    post:
      tags: [Labels]
      summary: Create a label
      operationId: createLabel
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LabelCreate' }
      responses:
        '201':
          description: Label created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LabelView' }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        '422': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
  /api/v1/labels/{labelId}:
    parameters:
      - $ref: '#/components/parameters/LabelId'
    patch:
      tags: [Labels]
      summary: Rename an owned label
      operationId: updateLabel
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LabelUpdate' }
      responses:
        '200':
          description: Updated label
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LabelView' }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        '422': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
    delete:
      tags: [Labels]
      summary: Delete a label and its note assignments
      operationId: deleteLabel
      parameters:
        - name: version
          in: query
          required: true
          schema: { type: integer, format: int64, minimum: 0 }
      responses:
        '204': { description: Label deleted }
        '404': { $ref: '#/components/responses/ProblemResponse' }
        '409': { $ref: '#/components/responses/ProblemResponse' }
        default: { $ref: '#/components/responses/ProblemResponse' }
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: GLACIER_SESSION
      description: Server-managed session cookie.
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Required on state-changing cookie-authenticated requests.
    bootstrapToken:
      type: apiKey
      in: header
      name: X-Bootstrap-Token
      description: One-time deployment secret used only while the instance is uninitialized.
  parameters:
    BootstrapToken:
      name: X-Bootstrap-Token
      in: header
      required: true
      description: One-time bootstrap secret. It is never returned or persisted.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    UserId:
      name: userId
      in: path
      required: true
      schema: { type: string, format: uuid }
    InvitationId:
      name: invitationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    NotebookId:
      name: notebookId
      in: path
      required: true
      schema: { type: string, format: uuid }
    NoteId:
      name: noteId
      in: path
      required: true
      schema: { type: string, format: uuid }
    LabelId:
      name: labelId
      in: path
      required: true
      schema: { type: string, format: uuid }
  headers:
    CorrelationId:
      description: Request correlation identifier.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[A-Za-z0-9._-]+$'
  responses:
    ProblemResponse:
      description: Standardized API error
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    RateLimitedProblemResponse:
      description: Too many attempts
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
        Retry-After:
          description: Seconds until another attempt is permitted.
          schema:
            type: integer
            minimum: 1
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    PingResponse:
      type: object
      required: [service, status, apiVersion, serverTime]
      properties:
        service:
          type: string
          const: glacier-notes-cloud
        status:
          type: string
          enum: [ok]
        apiVersion:
          type: string
          const: v1
        serverTime:
          type: string
          format: date-time
    SetupStatus:
      type: object
      required: [setupRequired]
      properties:
        setupRequired:
          type: boolean
    InitialAdministratorRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
          pattern: '^[\p{L}\p{N}._-]+$'
        email:
          type: string
          format: email
          maxLength: 320
        displayName:
          type: string
          maxLength: 128
        password:
          type: string
          format: password
          minLength: 12
          maxLength: 128
          pattern: '^\S+$'
    SetupCompletion:
      type: object
      required: [initialized, initializedAt]
      properties:
        initialized:
          type: boolean
        initializedAt:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required: [identifier, password, rememberMe]
      properties:
        identifier:
          type: string
          minLength: 1
          maxLength: 320
        password:
          type: string
          format: password
          minLength: 1
          maxLength: 128
        rememberMe:
          type: boolean
          default: false
    AuthenticatedUser:
      type: object
      required: [id, username, email, role]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
    SessionSummary:
      type: object
      required: [id, current, rememberMe, createdAt, lastSeenAt, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        current:
          type: boolean
        rememberMe:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        clientDescription:
          type: string
          maxLength: 512
    SessionContext:
      type: object
      required: [user, session]
      properties:
        user:
          $ref: '#/components/schemas/AuthenticatedUser'
        session:
          $ref: '#/components/schemas/SessionSummary'
    AdminStatus:
      type: object
      required: [service, status, apiVersion, database, imageStorageBackend, imageStorage]
      properties:
        service:
          type: string
          const: glacier-notes-cloud
        status:
          type: string
          enum: [ok]
        apiVersion:
          type: string
          const: v1
        database:
          type: string
          enum: [up]
        imageStorageBackend:
          type: string
          enum: [FILESYSTEM, POSTGRESQL, S3]
        imageStorage:
          type: string
          enum: [up, down]
    TokenRequest:
      type: object
      required: [token]
      properties:
        token: { type: string, minLength: 32, maxLength: 512 }
    InvitationInspection:
      type: object
      required: [emailHint, expiresAt]
      properties:
        emailHint: { type: string }
        proposedUsername: { type: string }
        displayName: { type: string }
        expiresAt: { type: string, format: date-time }
    InvitationAcceptanceRequest:
      type: object
      required: [token, username, password]
      properties:
        token: { type: string, minLength: 32, maxLength: 512 }
        username: { type: string, minLength: 3, maxLength: 64, pattern: '^[\p{L}\p{N}._-]+$' }
        displayName: { type: string, maxLength: 128 }
        password: { type: string, format: password, minLength: 12, maxLength: 128, pattern: '^\S+$' }
    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email, maxLength: 320 }
    PasswordResetCompletionRequest:
      type: object
      required: [token, password]
      properties:
        token: { type: string, minLength: 32, maxLength: 512 }
        password: { type: string, format: password, minLength: 12, maxLength: 128, pattern: '^\S+$' }
    AdminUser:
      type: object
      required: [id, username, email, role, status, createdAt, storageBytes, noteCount, notebookCount, imageCount]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        email: { type: string, format: email }
        displayName: { type: string }
        role: { type: string, enum: [USER, ADMIN] }
        status: { type: string, enum: [PENDING_ACTIVATION, ACTIVE, LOCKED, DEACTIVATED, PENDING_DELETION, DELETED] }
        createdAt: { type: string, format: date-time }
        lastLoginAt: { type: string, format: date-time }
        storageBytes: { type: integer, format: int64, minimum: 0 }
        noteCount: { type: integer, format: int64, minimum: 0 }
        notebookCount: { type: integer, format: int64, minimum: 0 }
        imageCount: { type: integer, format: int64, minimum: 0 }
    AdminUserPage:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AdminUser' }
        page: { $ref: '#/components/schemas/PageMetadata' }
    AdminUserUpdate:
      type: object
      properties:
        username: { type: string, minLength: 3, maxLength: 64 }
        email: { type: string, format: email, maxLength: 320 }
        displayName: { type: string, maxLength: 128 }
        role: { type: string, enum: [USER, ADMIN] }
    InvitationCreateRequest:
      type: object
      required: [email, role]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        proposedUsername: { type: string, minLength: 3, maxLength: 64 }
        displayName: { type: string, maxLength: 128 }
        role: { type: string, enum: [USER, ADMIN] }
    InvitationSummary:
      type: object
      required: [id, email, role, status, createdAt, expiresAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        proposedUsername: { type: string }
        displayName: { type: string }
        role: { type: string, enum: [USER, ADMIN] }
        status: { type: string, enum: [PENDING, ACCEPTED, REVOKED, EXPIRED] }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        acceptedAt: { type: string, format: date-time }
        revokedAt: { type: string, format: date-time }
    InvitationPage:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/InvitationSummary' }
        page: { $ref: '#/components/schemas/PageMetadata' }
    InvitationDelivery:
      type: object
      required: [invitation, delivery]
      properties:
        invitation: { $ref: '#/components/schemas/InvitationSummary' }
        delivery: { type: string, enum: [EMAIL_SENT, MANUAL] }
        token: { type: string }
        activationUrl: { type: string, format: uri }
    ResetLink:
      type: object
      required: [token, resetUrl, expiresAt]
      properties:
        token: { type: string }
        resetUrl: { type: string, format: uri }
        expiresAt: { type: string, format: date-time }
    AdminSettings:
      type: object
      required: [allowedEmailDomains, invitationExpirationHours, passwordResetExpirationMinutes, allowedImageTypes, maximumImageBytes, perUserStorageQuotaBytes, imageOrphanGraceHours]
      properties:
        allowedEmailDomains:
          type: array
          items: { type: string, maxLength: 253 }
        invitationExpirationHours: { type: integer, minimum: 1, maximum: 720 }
        passwordResetExpirationMinutes: { type: integer, minimum: 5, maximum: 1440 }
        allowedImageTypes:
          type: array
          items: { type: string, enum: [image/png, image/jpeg, image/webp] }
        maximumImageBytes: { type: integer, format: int64, minimum: 1048576, maximum: 52428800 }
        perUserStorageQuotaBytes: { type: integer, format: int64, minimum: 10485760, maximum: 1099511627776 }
        imageOrphanGraceHours: { type: integer, minimum: 1, maximum: 720 }
    AdminSettingsUpdate:
      type: object
      properties:
        allowedEmailDomains:
          type: array
          maxItems: 100
          items: { type: string, maxLength: 253 }
        invitationExpirationHours: { type: integer, minimum: 1, maximum: 720 }
        passwordResetExpirationMinutes: { type: integer, minimum: 5, maximum: 1440 }
        allowedImageTypes:
          type: array
          uniqueItems: true
          items: { type: string, enum: [image/png, image/jpeg, image/webp] }
        maximumImageBytes: { type: integer, format: int64, minimum: 1048576, maximum: 52428800 }
        perUserStorageQuotaBytes: { type: integer, format: int64, minimum: 10485760, maximum: 1099511627776 }
        imageOrphanGraceHours: { type: integer, minimum: 1, maximum: 720 }
    ImageMetadata:
      type: object
      required: [id, mimeType, byteSize, width, height, thumbnailMimeType, thumbnailByteSize, thumbnailWidth, thumbnailHeight, contentUrl, thumbnailUrl, createdAt]
      properties:
        id: { type: string, format: uuid }
        mimeType: { type: string, enum: [image/png, image/jpeg] }
        byteSize: { type: integer, format: int64, minimum: 0 }
        width: { type: integer, minimum: 1 }
        height: { type: integer, minimum: 1 }
        thumbnailMimeType: { type: string, enum: [image/png, image/jpeg] }
        thumbnailByteSize: { type: integer, format: int64, minimum: 0 }
        thumbnailWidth: { type: integer, minimum: 1 }
        thumbnailHeight: { type: integer, minimum: 1 }
        contentUrl: { type: string, format: uri-reference }
        thumbnailUrl: { type: string, format: uri-reference }
        createdAt: { type: string, format: date-time }
    StorageUsage:
      type: object
      required: [usedBytes, quotaBytes, remainingBytes, imageCount]
      properties:
        usedBytes: { type: integer, format: int64, minimum: 0 }
        quotaBytes: { type: integer, format: int64, minimum: 0 }
        remainingBytes: { type: integer, format: int64, minimum: 0 }
        imageCount: { type: integer, format: int64, minimum: 0 }
    ContentColor:
      type: string
      enum: [DEFAULT, RED, ORANGE, YELLOW, GREEN, BLUE, PURPLE, GRAY]
    NoteType:
      type: string
      enum: [TEXT, CHECKLIST]
    NotebookView:
      type: object
      required: [id, name, color, defaultNotebook, sortOrder, noteCount, createdAt, updatedAt, version]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 255 }
        color: { $ref: '#/components/schemas/ContentColor' }
        defaultNotebook: { type: boolean }
        sortOrder: { type: integer, minimum: 0 }
        noteCount: { type: integer, format: int64, minimum: 0 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        version: { type: integer, format: int64, minimum: 0 }
    NotebookCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        color: { $ref: '#/components/schemas/ContentColor' }
      example:
        name: Projects
        color: BLUE
    NotebookUpdate:
      type: object
      required: [version]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        color: { $ref: '#/components/schemas/ContentColor' }
        version: { type: integer, format: int64, minimum: 0 }
    NotebookOrderEntry:
      type: object
      required: [id, version]
      properties:
        id: { type: string, format: uuid }
        version: { type: integer, format: int64, minimum: 0 }
    NotebookReorder:
      type: object
      required: [notebooks]
      properties:
        notebooks:
          type: array
          minItems: 1
          maxItems: 500
          items: { $ref: '#/components/schemas/NotebookOrderEntry' }
    LabelView:
      type: object
      required: [id, name, createdAt, updatedAt, version]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 255 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        version: { type: integer, format: int64, minimum: 0 }
    LabelCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
      example:
        name: Important
    LabelUpdate:
      type: object
      required: [name, version]
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        version: { type: integer, format: int64, minimum: 0 }
    ChecklistItemInput:
      type: object
      required: [text, checked]
      properties:
        id: { type: string, format: uuid }
        text: { type: string, maxLength: 10000 }
        checked: { type: boolean }
    ChecklistItemView:
      type: object
      required: [id, text, checked, sortOrder, createdAt, updatedAt, version]
      properties:
        id: { type: string, format: uuid }
        text: { type: string }
        checked: { type: boolean }
        sortOrder: { type: integer, minimum: 0 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        version: { type: integer, format: int64, minimum: 0 }
    NoteCreate:
      type: object
      required: [noteType]
      properties:
        id: { type: string, format: uuid }
        notebookId: { type: string, format: uuid }
        noteType: { $ref: '#/components/schemas/NoteType' }
        title: { type: string, maxLength: 10000, default: '' }
        content: { type: string, default: '' }
        checklistItems:
          type: array
          maxItems: 10000
          items: { $ref: '#/components/schemas/ChecklistItemInput' }
        pinned: { type: boolean, default: false }
        archived: { type: boolean, default: false }
        color: { $ref: '#/components/schemas/ContentColor' }
        labelIds:
          type: array
          maxItems: 500
          items: { type: string, format: uuid }
        imageIds:
          type: array
          maxItems: 500
          default: []
          items: { type: string, format: uuid }
      example:
        id: 80e10c3b-aaba-4f1c-a427-7564b1d5eaaf
        notebookId: 6bc170c2-94c2-4400-a558-b00ffc449fb3
        noteType: CHECKLIST
        title: Release checklist
        content: ''
        checklistItems:
          - { text: Run verification, checked: false }
          - { text: Publish artifacts, checked: false }
        pinned: true
        archived: false
        color: BLUE
        labelIds: [a06bc822-d59c-4726-8ab1-c2a28d34242a]
    NoteUpdate:
      type: object
      required: [title, content, checklistItems, pinned, archived, color, labelIds, version]
      properties:
        title: { type: string, maxLength: 10000 }
        content: { type: string }
        checklistItems:
          type: array
          maxItems: 10000
          items: { $ref: '#/components/schemas/ChecklistItemInput' }
        pinned: { type: boolean }
        archived: { type: boolean }
        color: { $ref: '#/components/schemas/ContentColor' }
        labelIds:
          type: array
          maxItems: 500
          items: { type: string, format: uuid }
        imageIds:
          type: array
          maxItems: 500
          items: { type: string, format: uuid }
        version: { type: integer, format: int64, minimum: 0 }
    ContentNote:
      type: object
      required: [id, notebookId, noteType, title, content, checklistItems, pinned, archived, color, labelIds, imageIds, createdAt, updatedAt, version]
      properties:
        id: { type: string, format: uuid }
        notebookId: { type: string, format: uuid }
        noteType: { $ref: '#/components/schemas/NoteType' }
        title: { type: string }
        content: { type: string }
        checklistItems:
          type: array
          items: { $ref: '#/components/schemas/ChecklistItemView' }
        pinned: { type: boolean }
        archived: { type: boolean }
        color: { $ref: '#/components/schemas/ContentColor' }
        labelIds:
          type: array
          items: { type: string, format: uuid }
        imageIds:
          type: array
          items: { type: string, format: uuid }
