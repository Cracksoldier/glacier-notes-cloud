openapi: 3.1.0
info:
  title: Glacier Notes Cloud API
  version: 1.0.0
  description: |
    Canonical contract for Glacier Notes Cloud. Operations are added before their
    implementing milestone. UUIDs use RFC 4122 form and timestamps are ISO-8601 UTC.
servers:
  - url: /
tags:
  - name: System
  - name: Setup
  - name: Authentication
  - name: Sessions
  - name: Administration
paths:
  /api/v1/ping:
    get:
      tags: [System]
      summary: Check API connectivity
      operationId: ping
      security: []
      responses:
        '200':
          description: API is reachable
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/setup/status:
    get:
      tags: [Setup]
      summary: Check whether first-run setup is required
      operationId: getSetupStatus
      security: []
      responses:
        '200':
          description: Current setup state
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupStatus'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/setup/administrator:
    post:
      tags: [Setup]
      summary: Create the first administrator and initialize the instance
      operationId: createInitialAdministrator
      security:
        - bootstrapToken: []
      parameters:
        - $ref: '#/components/parameters/BootstrapToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitialAdministratorRequest'
      responses:
        '201':
          description: Instance initialized
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupCompletion'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        '422':
          $ref: '#/components/responses/ProblemResponse'
        '429':
          $ref: '#/components/responses/RateLimitedProblemResponse'
        '503':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate with a username or email address
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
            Set-Cookie:
              description: Session and CSRF cookies.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionContext'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '429':
          $ref: '#/components/responses/RateLimitedProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/auth/logout:
    post:
      tags: [Authentication]
      summary: Revoke the current session
      operationId: logout
      responses:
        '204':
          description: Session revoked
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/auth/session:
    get:
      tags: [Authentication]
      summary: Get the current authenticated session
      operationId: getCurrentSession
      responses:
        '200':
          description: Current session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionContext'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/me/sessions:
    get:
      tags: [Sessions]
      summary: List active sessions for the current user
      operationId: listSessions
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionSummary'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags: [Sessions]
      summary: Revoke all sessions except the current one
      operationId: revokeOtherSessions
      responses:
        '204':
          description: Other sessions revoked
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/me/sessions/{sessionId}:
    delete:
      tags: [Sessions]
      summary: Revoke one of the current user's sessions
      operationId: revokeSession
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Session revoked
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        '404':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /api/v1/admin/status:
    get:
      tags: [Administration]
      summary: Get non-sensitive administrative status
      operationId: getAdminStatus
      responses:
        '200':
          description: Administrative status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStatus'
        '401':
          $ref: '#/components/responses/ProblemResponse'
        '403':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: GLACIER_SESSION
      description: Server-managed session cookie.
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Required on state-changing cookie-authenticated requests.
    bootstrapToken:
      type: apiKey
      in: header
      name: X-Bootstrap-Token
      description: One-time deployment secret used only while the instance is uninitialized.
  parameters:
    BootstrapToken:
      name: X-Bootstrap-Token
      in: header
      required: true
      description: One-time bootstrap secret. It is never returned or persisted.
      schema:
        type: string
        minLength: 1
        maxLength: 512
  headers:
    CorrelationId:
      description: Request correlation identifier.
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[A-Za-z0-9._-]+$'
  responses:
    ProblemResponse:
      description: Standardized API error
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    RateLimitedProblemResponse:
      description: Too many attempts
      headers:
        X-Correlation-ID:
          $ref: '#/components/headers/CorrelationId'
        Retry-After:
          description: Seconds until another attempt is permitted.
          schema:
            type: integer
            minimum: 1
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    PingResponse:
      type: object
      required: [service, status, apiVersion, serverTime]
      properties:
        service:
          type: string
          const: glacier-notes-cloud
        status:
          type: string
          enum: [ok]
        apiVersion:
          type: string
          const: v1
        serverTime:
          type: string
          format: date-time
    SetupStatus:
      type: object
      required: [setupRequired]
      properties:
        setupRequired:
          type: boolean
    InitialAdministratorRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
          pattern: '^[\p{L}\p{N}._-]+$'
        email:
          type: string
          format: email
          maxLength: 320
        displayName:
          type: string
          maxLength: 128
        password:
          type: string
          format: password
          minLength: 12
          maxLength: 128
          pattern: '^\S+$'
    SetupCompletion:
      type: object
      required: [initialized, initializedAt]
      properties:
        initialized:
          type: boolean
        initializedAt:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required: [identifier, password, rememberMe]
      properties:
        identifier:
          type: string
          minLength: 1
          maxLength: 320
        password:
          type: string
          format: password
          minLength: 1
          maxLength: 128
        rememberMe:
          type: boolean
          default: false
    AuthenticatedUser:
      type: object
      required: [id, username, email, role]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
    SessionSummary:
      type: object
      required: [id, current, rememberMe, createdAt, lastSeenAt, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        current:
          type: boolean
        rememberMe:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        clientDescription:
          type: string
          maxLength: 512
    SessionContext:
      type: object
      required: [user, session]
      properties:
        user:
          $ref: '#/components/schemas/AuthenticatedUser'
        session:
          $ref: '#/components/schemas/SessionSummary'
    AdminStatus:
      type: object
      required: [service, status, apiVersion, database]
      properties:
        service:
          type: string
          const: glacier-notes-cloud
        status:
          type: string
          enum: [ok]
        apiVersion:
          type: string
          const: v1
        database:
          type: string
          enum: [up]
    ProblemDetails:
      type: object
      required: [type, title, status, detail, correlationId, errorCode]
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        correlationId:
          type: string
        errorCode:
          type: string
          pattern: '^[A-Z][A-Z0-9_]+$'
        validationErrors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
    ValidationError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string
    PageMetadata:
      type: object
      required: [size, hasNext]
      properties:
        size:
          type: integer
          minimum: 0
        hasNext:
          type: boolean
        nextCursor:
          type: string
security:
  - sessionCookie: []
    csrfHeader: []
