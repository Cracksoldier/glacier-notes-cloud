services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/s3_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/s3_secret_key
    volumes:
      - minio_data:/data
      - type: bind
        source: ${GLACIER_S3_ACCESS_KEY_FILE:-./deployment/secrets/s3-access-key.txt}
        target: /run/secrets/s3_access_key
        read_only: true
      - type: bind
        source: ${GLACIER_S3_SECRET_KEY_FILE:-./deployment/secrets/s3-secret-key.txt}
        target: /run/secrets/s3_secret_key
        read_only: true
    ports:
      - "127.0.0.1:${GLACIER_MINIO_API_PORT:-9002}:9000"
      - "127.0.0.1:${GLACIER_MINIO_CONSOLE_PORT:-9003}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      GLACIER_S3_BUCKET: ${GLACIER_S3_BUCKET:-glacier-notes}
    volumes:
      - type: bind
        source: ${GLACIER_S3_ACCESS_KEY_FILE:-./deployment/secrets/s3-access-key.txt}
        target: /run/secrets/s3_access_key
        read_only: true
      - type: bind
        source: ${GLACIER_S3_SECRET_KEY_FILE:-./deployment/secrets/s3-secret-key.txt}
        target: /run/secrets/s3_secret_key
        read_only: true
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 "$$(cat /run/secrets/s3_access_key)" "$$(cat /run/secrets/s3_secret_key)" &&
        mc mb --ignore-existing "local/$${GLACIER_S3_BUCKET}" &&
        mc anonymous set none "local/$${GLACIER_S3_BUCKET}"
    security_opt:
      - no-new-privileges:true

  app:
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      GLACIER_IMAGE_BACKEND: S3
      GLACIER_S3_ENDPOINT: http://minio:9000
      GLACIER_S3_PATH_STYLE: "true"
    volumes:
      - type: bind
        source: ${GLACIER_S3_ACCESS_KEY_FILE:-./deployment/secrets/s3-access-key.txt}
        target: /run/secrets/s3_access_key
        read_only: true
      - type: bind
        source: ${GLACIER_S3_SECRET_KEY_FILE:-./deployment/secrets/s3-secret-key.txt}
        target: /run/secrets/s3_secret_key
        read_only: true

volumes:
  minio_data:
