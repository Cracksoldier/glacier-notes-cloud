name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Validate OpenAPI and regenerate contracts
        run: ./mvnw -pl backend clean generate-sources
      - name: Detect generated Angular client drift
        run: git diff --exit-code -- frontend/src/app/shared/generated-api

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Compile and test with PostgreSQL
        run: ./mvnw verify

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Reject Prettier
        run: test ! -e .prettierrc && ! npm ls prettier --depth=0
      - run: npm run check
      - run: npm run build:production
      - run: npm run test:ci
      - run: npm audit --omit=dev --audit-level=high

