name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Validate OpenAPI and regenerate contracts
        run: ./mvnw -pl backend clean generate-sources
      - name: Detect generated Angular client drift
        run: git diff --exit-code -- frontend/src/app/shared/generated-api

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Compile and test with PostgreSQL
        run: ./mvnw verify

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Verify repository and generated-client metadata
        run: npm run test:repository
      - name: Build the generated Angular package independently
        run: |
          generated_dir="$(mktemp -d)"
          cp -R src/app/shared/generated-api/. "$generated_dir/"
          npm --prefix "$generated_dir" install --ignore-scripts --package-lock=false
          npm --prefix "$generated_dir" run build
      - name: Reject Prettier
        run: test ! -e .prettierrc && ! npm ls prettier --depth=0
      - run: npm run check
      - run: npm run build:production
      - run: npm run test:ci
      - run: npm audit --omit=dev --audit-level=high

  deployment:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      GLACIER_BACKUP_ENABLED: 'true'
      GLACIER_BUILD_IDENTIFIER: github-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install browser test dependencies
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Create ephemeral Compose secrets
        run: |
          mkdir -p deployment/secrets
          printf '%s\n' 'ci-database-password-with-32-characters' > deployment/secrets/database-password.txt
          printf '%s\n' 'ci-bootstrap-token-with-at-least-32-characters' > deployment/secrets/bootstrap-token.txt
          printf '%s\n' 'ci-session-secret-with-at-least-32-characters' > deployment/secrets/session-secret.txt
      - name: Build and start the supported deployment
        run: docker compose up --build --wait --wait-timeout 180
      - name: Verify application and management endpoints
        run: |
          curl --fail --silent --show-error http://127.0.0.1:8080/ >/dev/null
          curl --fail --silent --show-error \
            http://127.0.0.1:8080/api/v1/setup/status \
            | jq --exit-status '.setupRequired == true' >/dev/null
          curl --fail --silent --show-error \
            http://127.0.0.1:9000/q/health/ready \
            | jq --exit-status '.status == "UP"' >/dev/null
          curl --fail --silent --show-error \
            http://127.0.0.1:9000/q/metrics >/dev/null
      - name: Verify bootstrap persists across container recreation
        run: |
          curl --fail --silent \
            --header 'Content-Type: application/json' \
            --header 'X-Bootstrap-Token: ci-bootstrap-token-with-at-least-32-characters' \
            --data '{"username":"admin","email":"admin@example.com","password":"ci-container-smoke-passphrase-2026"}' \
            http://127.0.0.1:8080/api/v1/setup/administrator | grep '"initialized":true'
          docker compose up -d --force-recreate --wait --wait-timeout 120 app
          curl --fail --silent http://127.0.0.1:8080/api/v1/setup/status | grep '"setupRequired":false'
      - name: Verify login, persisted session, invitation activation, and logout
        run: |
          curl --fail --silent \
            --cookie-jar /tmp/glacier-cookies.txt \
            --header 'Content-Type: application/json' \
            --data '{"identifier":"ADMIN@example.com","password":"ci-container-smoke-passphrase-2026","rememberMe":true}' \
            http://127.0.0.1:8080/api/v1/auth/login | grep '"role":"ADMIN"'
          docker compose up -d --force-recreate --wait --wait-timeout 120 app
          curl --fail --silent \
            --cookie /tmp/glacier-cookies.txt \
            http://127.0.0.1:8080/api/v1/auth/session | grep '"current":true'
          csrf_token="$(awk '$6 == "GLACIER_CSRF" {print $7}' /tmp/glacier-cookies.txt)"
          test -n "$csrf_token"
          invalid_csrf_status="$(curl --silent --show-error \
            --output /tmp/glacier-invalid-csrf.json \
            --write-out '%{http_code}' \
            --cookie /tmp/glacier-cookies.txt \
            --header 'X-CSRF-Token: invalid-ci-csrf-token' \
            --request POST \
            http://127.0.0.1:8080/api/v1/auth/logout)"
          test "$invalid_csrf_status" = "403"
          jq --exit-status '.errorCode == "CSRF_INVALID"' \
            /tmp/glacier-invalid-csrf.json >/dev/null
          curl --fail --silent \
            --cookie /tmp/glacier-cookies.txt \
            http://127.0.0.1:8080/api/v1/auth/session | grep '"current":true'
          invitation_response="$(curl --fail --silent \
            --cookie /tmp/glacier-cookies.txt \
            --header "X-CSRF-Token: $csrf_token" \
            --header 'Content-Type: application/json' \
            --data '{"email":"member@example.com","proposedUsername":"member","role":"USER"}' \
            http://127.0.0.1:8080/api/v1/admin/invitations)"
          invitation_token="$(printf '%s' "$invitation_response" | jq --raw-output '.token')"
          test -n "$invitation_token"
          test "$invitation_token" != "null"
          curl --fail --silent \
            --header 'Content-Type: application/json' \
            --data "{\"token\":\"$invitation_token\",\"username\":\"member\",\"password\":\"ci-invited-user-passphrase-2026\"}" \
            http://127.0.0.1:8080/api/v1/auth/invitations/accept
          curl --fail --silent \
            --header 'Content-Type: application/json' \
            --data '{"identifier":"member","password":"ci-invited-user-passphrase-2026","rememberMe":false}' \
            http://127.0.0.1:8080/api/v1/auth/login | grep '"role":"USER"'
          curl --fail --silent \
            --cookie /tmp/glacier-cookies.txt \
            --header "X-CSRF-Token: $csrf_token" \
            --request POST \
            http://127.0.0.1:8080/api/v1/auth/logout
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --cookie /tmp/glacier-cookies.txt \
            http://127.0.0.1:8080/api/v1/auth/session)" = "401"
      - name: Verify the core note workflow in desktop and tablet browsers
        working-directory: frontend
        env:
          GLACIER_E2E_BASE_URL: http://127.0.0.1:8080
          GLACIER_E2E_USERNAME: member
          GLACIER_E2E_PASSWORD: ci-invited-user-passphrase-2026
        run: npm run test:e2e
      - name: Verify backup creation and clean database restore
        run: |
          curl --fail --silent --show-error \
            --cookie-jar /tmp/glacier-backup-cookies.txt \
            --header 'Content-Type: application/json' \
            --data '{"identifier":"admin","password":"ci-container-smoke-passphrase-2026","rememberMe":false}' \
            http://127.0.0.1:8080/api/v1/auth/login >/dev/null
          csrf_token="$(awk '$6 == "GLACIER_CSRF" {print $7}' /tmp/glacier-backup-cookies.txt)"
          test -n "$csrf_token"
          backup_id="$(curl --fail --silent --show-error \
            --cookie /tmp/glacier-backup-cookies.txt \
            --header "X-CSRF-Token: $csrf_token" \
            --request POST \
            http://127.0.0.1:8080/api/v1/admin/backups | jq --raw-output '.id')"
          test -n "$backup_id"
          for attempt in $(seq 1 60); do
            backup_json="$(curl --fail --silent --show-error \
              --cookie /tmp/glacier-backup-cookies.txt \
              "http://127.0.0.1:8080/api/v1/admin/backups/$backup_id")"
            state="$(printf '%s' "$backup_json" | jq --raw-output '.state')"
            if [ "$state" = "SUCCEEDED" ]; then break; fi
            test "$state" != "FAILED"
            sleep 1
          done
          test "$state" = "SUCCEEDED"
          output="$(printf '%s' "$backup_json" | jq --raw-output '.outputIdentifier')"
          expected_archive_checksum="$(printf '%s' "$backup_json" | jq --raw-output '.checksum')"
          docker compose cp "app:/var/lib/glacier-notes/backups/$output" /tmp/glacier-backup.zip
          test "$(sha256sum /tmp/glacier-backup.zip | cut -d' ' -f1)" = "$expected_archive_checksum"
          mkdir /tmp/glacier-backup-contents
          unzip -q /tmp/glacier-backup.zip -d /tmp/glacier-backup-contents
          jq -r '.checksums | to_entries[] | [.value, .key] | @tsv' \
            /tmp/glacier-backup-contents/manifest.json |
            while IFS="$(printf '\t')" read -r expected path; do
              printf '%s  %s\n' "$expected" "/tmp/glacier-backup-contents/$path" |
                sha256sum --check -
            done
          docker run --detach --name glacier-m11-restore \
            --env POSTGRES_PASSWORD=clean-restore-password \
            --env POSTGRES_DB=glacier_restore postgres:18.3-alpine
          for attempt in $(seq 1 60); do
            if docker exec glacier-m11-restore \
              pg_isready -U postgres -d glacier_restore; then break; fi
            sleep 1
          done
          docker cp /tmp/glacier-backup-contents/database.dump \
            glacier-m11-restore:/tmp/database.dump
          docker exec --env PGPASSWORD=clean-restore-password glacier-m11-restore \
            pg_restore --clean --if-exists --no-owner --no-privileges \
              -U postgres -d glacier_restore /tmp/database.dump
          docker exec --env PGPASSWORD=clean-restore-password glacier-m11-restore \
            psql -U postgres -d glacier_restore --tuples-only \
              --command 'select count(*) from flyway_schema_history;' |
            grep --extended-regexp '[1-9]'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
      - name: Stop deployment
        if: always()
        run: |
          docker rm --force glacier-m11-restore 2>/dev/null || true
          docker compose down --volumes
