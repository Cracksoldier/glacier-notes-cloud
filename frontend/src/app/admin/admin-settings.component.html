<h1>Instance settings</h1>
<p>
  Leave domains empty to allow invitations to any valid email address. Enter one exact domain per
  line.
</p>
<form (ngSubmit)="save()">
  <label
    >Allowed email domains<textarea name="domains" rows="6" [(ngModel)]="domains"></textarea></label
  >
  <label
    >Invitation expiration (hours)<input
      name="invitationHours"
      type="number"
      min="1"
      max="720"
      [(ngModel)]="invitationHours"
    ></label
  >
  <label
    >Password reset expiration (minutes)<input
      name="resetMinutes"
      type="number"
      min="5"
      max="1440"
      [(ngModel)]="resetMinutes"
    ></label
  >
  <fieldset>
    <legend>Accepted image uploads</legend>
    @for (type of ['image/png', 'image/jpeg', 'image/webp']; track type) {
    <label
      ><input
        type="checkbox"
        [checked]="imageTypes.has(type)"
        (change)="toggleImageType(type, $any($event.target).checked)"
      > {{ type }}</label
    >
    }
  </fieldset>
  <label
    >Maximum normalized image (MB)<input
      name="maximumImageMb"
      type="number"
      min="1"
      max="50"
      [(ngModel)]="maximumImageMb"
    ></label
  >
  <label
    >Per-user image quota (MB)<input
      name="quotaMb"
      type="number"
      min="10"
      max="1048576"
      [(ngModel)]="quotaMb"
    ></label
  >
  <label
    >Unreferenced image grace period (hours)<input
      name="orphanGraceHours"
      type="number"
      min="1"
      max="720"
      [(ngModel)]="orphanGraceHours"
    ></label
  >
  <label
    >Maximum note versions<input
      name="noteVersionMaximumCount"
      type="number"
      min="1"
      max="500"
      [(ngModel)]="noteVersionMaximumCount"
    ></label
  >
  <label
    >Note version retention (days)<input
      name="noteVersionRetentionDays"
      type="number"
      min="1"
      max="3650"
      [(ngModel)]="noteVersionRetentionDays"
    ></label
  >
  <button type="submit">Save settings</button>
</form>
@if (message()) {
<p role="status">{{ message() }}</p>
} @if (error()) {
<p role="alert">{{ error() }}</p>
}
