<main class="public-page">
  <section class="card">
    <h1>Choose a new password</h1>
    @if (!done()) {
    <form (ngSubmit)="submit()">
      <label>Reset token<input name="token" [(ngModel)]="token" required></label>
      <label
        >New password<input
          name="password"
          type="password"
          [(ngModel)]="password"
          minlength="12"
          required
        ></label
      >
      <button type="submit">Change password</button>
    </form>
    } @else {
    <p role="status">Your password was changed and existing sessions were signed out.</p>
    <a href="/login" routerLink="/login">Sign in</a>
    } @if (error()) {
    <p class="error" role="alert">{{ error() }}</p>
    }
  </section>
</main>
