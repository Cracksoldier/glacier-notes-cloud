<main class="public-page">
  <section class="card">
    <h1>Reset your password</h1>
    <p>Enter your email address. If reset email is available, we will send instructions.</p>
    @if (!sent()) {
    <form (ngSubmit)="submit()">
      <label>Email<input name="email" type="email" [(ngModel)]="email" required></label>
      <button type="submit">Request reset</button>
    </form>
    } @else {
    <p role="status">If the account can receive reset email, instructions have been sent.</p>
    }
    <a href="/login" routerLink="/login">Back to sign in</a>
  </section>
</main>
