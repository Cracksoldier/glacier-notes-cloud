<main class="public-page">
  <section class="card">
    <p class="eyebrow">Invitation</p>
    <h1>Create your account</h1>
    @if (!inspection()) {
    <form (ngSubmit)="inspect()">
      <label
        >Full invitation token<input
          name="token"
          type="password"
          autocomplete="off"
          spellcheck="false"
          [(ngModel)]="token"
          required
        ></label
      >
      <button type="submit">Continue</button>
    </form>
    } @else if (!completed()) {
    <p>
      Invitation for {{ inspection()?.emailHint }}. Expires
      {{ inspection()?.expiresAt | date:'medium' }}.
    </p>
    <form (ngSubmit)="accept()">
      <label>Username<input name="username" [(ngModel)]="username" minlength="3" required></label>
      <label>Display name<input name="displayName" [(ngModel)]="displayName"></label>
      <label
        >Password<input
          name="password"
          [(ngModel)]="password"
          type="password"
          minlength="12"
          required
        ></label
      >
      <button type="submit" [disabled]="busy()">Activate account</button>
    </form>
    } @else {
    <p role="status">Your account is active. You can now sign in.</p>
    <a href="/login" routerLink="/login">Go to sign in</a>
    } @if (error()) {
    <p class="error" role="alert">{{ error() }}</p>
    }
  </section>
</main>
