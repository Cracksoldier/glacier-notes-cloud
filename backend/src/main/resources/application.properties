quarkus.application.name=glacier-notes-cloud
quarkus.http.root-path=/
quarkus.http.cors.enabled=false
quarkus.http.proxy.proxy-address-forwarding=false
quarkus.management.enabled=true
quarkus.management.port=9000
quarkus.hibernate-orm.mapping.format.global=ignore
quarkus.datasource.db-kind=postgresql
quarkus.flyway.migrate-at-start=true
# Flyway validates applied migrations as part of migrate. Running validate-at-start separately
# happens before migrate and incorrectly prevents a blank database from bootstrapping.
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.log.sql=false
quarkus.jackson.fail-on-unknown-properties=true
glacier.public-base-url=${GLACIER_PUBLIC_BASE_URL:http://localhost:8080}
glacier.smtp.enabled=${GLACIER_SMTP_ENABLED:false}
glacier.smtp.sender-name=${GLACIER_SMTP_SENDER_NAME:Glacier Notes}
glacier.smtp.sender-address=${GLACIER_SMTP_SENDER_ADDRESS:noreply@localhost}
quarkus.mailer.host=${GLACIER_SMTP_HOST:localhost}
quarkus.mailer.port=${GLACIER_SMTP_PORT:587}
quarkus.mailer.username=${GLACIER_SMTP_USERNAME:}
quarkus.mailer.password=${GLACIER_SMTP_PASSWORD:}
quarkus.mailer.start-tls=${GLACIER_SMTP_START_TLS:REQUIRED}
quarkus.mailer.tls=${GLACIER_SMTP_TLS:false}
quarkus.mailer.from=${GLACIER_SMTP_SENDER_ADDRESS:noreply@localhost}
%test.quarkus.mailer.mock=true
%test.quarkus.log.category."quarkus-mailer".level=WARN

%prod.quarkus.datasource.jdbc.url=${GLACIER_DATABASE_URL}
%prod.quarkus.datasource.username=${GLACIER_DATABASE_USERNAME}
%prod.quarkus.datasource.password=${GLACIER_DATABASE_PASSWORD}
%prod.quarkus.http.host=0.0.0.0
%prod.quarkus.management.host=0.0.0.0

quarkus.log.console.json.enabled=false
%prod.quarkus.log.console.json.enabled=true
