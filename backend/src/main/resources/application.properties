quarkus.application.name=glacier-notes-cloud
quarkus.http.root-path=/
quarkus.http.cors.enabled=false
quarkus.http.proxy.proxy-address-forwarding=false
quarkus.management.enabled=true
quarkus.management.port=9000
quarkus.micrometer.enabled=${GLACIER_METRICS_ENABLED:true}
quarkus.micrometer.export.prometheus.enabled=${GLACIER_METRICS_ENABLED:true}
quarkus.hibernate-orm.mapping.format.global=ignore
quarkus.datasource.db-kind=postgresql
quarkus.flyway.migrate-at-start=true
# Flyway validates applied migrations as part of migrate. Running validate-at-start separately
# happens before migrate and incorrectly prevents a blank database from bootstrapping.
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.log.sql=false
quarkus.jackson.fail-on-unknown-properties=true
glacier.public-base-url=${GLACIER_PUBLIC_BASE_URL:http://localhost:8080}
glacier.smtp.enabled=${GLACIER_SMTP_ENABLED:false}
glacier.smtp.username=${GLACIER_SMTP_USERNAME:}
glacier.smtp.password=${GLACIER_SMTP_PASSWORD:}
glacier.http.default-maximum-body-bytes=${GLACIER_HTTP_DEFAULT_MAXIMUM_BODY_BYTES:10485760}
glacier.http.multipart-overhead-bytes=${GLACIER_HTTP_MULTIPART_OVERHEAD_BYTES:1048576}
glacier.http.absolute-maximum-body-bytes=${GLACIER_HTTP_ABSOLUTE_MAXIMUM_BODY_BYTES:1611661312}
glacier.http.uploads-directory=${GLACIER_TRANSFER_UPLOAD_ROOT:${java.io.tmpdir}/glacier-notes-uploads}
glacier.images.backend=${GLACIER_IMAGE_BACKEND:FILESYSTEM}
glacier.images.filesystem-root=${GLACIER_IMAGE_FILESYSTEM_ROOT:/var/lib/glacier-notes/images}
glacier.images.maximum-upload-bytes=41943040
glacier.images.maximum-pixels=40000000
glacier.images.maximum-edge=2560
glacier.images.thumbnail-edge=480
glacier.images.processing-timeout-seconds=10
glacier.images.s3.endpoint=${GLACIER_S3_ENDPOINT:}
glacier.images.s3.region=${GLACIER_S3_REGION:us-east-1}
glacier.images.s3.bucket=${GLACIER_S3_BUCKET:glacier-notes}
glacier.images.s3.path-style=${GLACIER_S3_PATH_STYLE:true}
glacier.images.s3.access-key-file=${GLACIER_S3_ACCESS_KEY_FILE:}
glacier.images.s3.secret-key-file=${GLACIER_S3_SECRET_KEY_FILE:}
glacier.images.s3.server-side-encryption=${GLACIER_S3_SERVER_SIDE_ENCRYPTION:}
glacier.images.s3.api-call-timeout-seconds=${GLACIER_S3_API_CALL_TIMEOUT_SECONDS:30}
glacier.images.s3.api-call-attempt-timeout-seconds=${GLACIER_S3_API_CALL_ATTEMPT_TIMEOUT_SECONDS:10}
glacier.transfer.temporary-root=${GLACIER_TRANSFER_TEMPORARY_ROOT:/var/lib/glacier-notes/transfers}
glacier.transfer.maximum-upload-bytes=${GLACIER_TRANSFER_MAXIMUM_UPLOAD_BYTES:1610612736}
glacier.transfer.maximum-decoded-image-bytes=${GLACIER_TRANSFER_MAXIMUM_DECODED_IMAGE_BYTES:1073741824}
glacier.transfer.maximum-image-bytes=10485760
glacier.transfer.maximum-notebooks=10000
glacier.transfer.maximum-notes=100000
glacier.transfer.maximum-labels=10000
glacier.transfer.maximum-images=100000
glacier.transfer.maximum-checklist-items=1000000
glacier.transfer.maximum-json-depth=32
glacier.transfer.maximum-string-length=16777216
glacier.transfer.retention-hours=${GLACIER_TRANSFER_RETENTION_HOURS:24}
glacier.backup.enabled=${GLACIER_BACKUP_ENABLED:false}
glacier.backup.directory=${GLACIER_BACKUP_DIRECTORY:/var/lib/glacier-notes/backups}
glacier.backup.build-identifier=${GLACIER_BUILD_IDENTIFIER:unknown}
quarkus.http.limits.max-form-attribute-size=${GLACIER_TRANSFER_MAXIMUM_UPLOAD_BYTES:1610612736}
quarkus.http.limits.max-body-size=${GLACIER_HTTP_ABSOLUTE_MAXIMUM_BODY_BYTES:1611661312}
quarkus.http.body.uploads-directory=${GLACIER_TRANSFER_UPLOAD_ROOT:${java.io.tmpdir}/glacier-notes-uploads}
%dev.glacier.images.filesystem-root=${java.io.tmpdir}/glacier-notes-dev-images
%test.glacier.images.filesystem-root=${java.io.tmpdir}/glacier-notes-test-images
%dev.glacier.transfer.temporary-root=${java.io.tmpdir}/glacier-notes-dev-transfers
%test.glacier.transfer.temporary-root=${java.io.tmpdir}/glacier-notes-test-transfers
%test.glacier.backup.directory=${java.io.tmpdir}/glacier-notes-test-backups
glacier.smtp.sender-name=${GLACIER_SMTP_SENDER_NAME:Glacier Notes}
glacier.smtp.sender-address=${GLACIER_SMTP_SENDER_ADDRESS:noreply@localhost}
quarkus.mailer.host=${GLACIER_SMTP_HOST:localhost}
quarkus.mailer.port=${GLACIER_SMTP_PORT:587}
quarkus.mailer.username=${GLACIER_SMTP_USERNAME:}
quarkus.mailer.password=${GLACIER_SMTP_PASSWORD:}
quarkus.mailer.start-tls=${GLACIER_SMTP_START_TLS:REQUIRED}
quarkus.mailer.tls=${GLACIER_SMTP_TLS:false}
quarkus.mailer.from=${GLACIER_SMTP_SENDER_ADDRESS:noreply@localhost}
%test.quarkus.mailer.mock=true
%test.quarkus.log.category."quarkus-mailer".level=WARN

%prod.quarkus.datasource.jdbc.url=${GLACIER_DATABASE_URL}
%prod.quarkus.datasource.username=${GLACIER_DATABASE_USERNAME}
%prod.quarkus.datasource.password=${GLACIER_DATABASE_PASSWORD}
%prod.quarkus.http.host=0.0.0.0
%prod.quarkus.management.host=0.0.0.0

quarkus.log.console.json.enabled=false
%prod.quarkus.log.console.json.enabled=true
